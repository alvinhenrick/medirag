name: CI + Sync to Hugging Face
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest tests/

  sync-to-hub:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install hf CLI
        run: pip install "huggingface_hub[cli]>=1.5.0"
      - name: Upload to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
        run: |
          hf upload "$HF_USERNAME/medirag" . . \
            --repo-type space \
            --commit-message "Sync from GitHub ${GITHUB_SHA::7}" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "tests/*" \
            --exclude "lance_db/*" \
            --exclude "rag_cache.json" \
            --exclude "__pycache__/*" \
            --exclude "**/__pycache__/*"
